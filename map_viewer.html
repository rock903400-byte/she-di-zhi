<!DOCTYPE html>
<html lang="zh-Hant" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>社地址地圖顯示器</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --primary: #2563eb; --primary-light: #dbeafe; --primary-dark: #1d4ed8;
            --success: #16a34a; --success-bg: #dcfce7; --success-dark: #15803d;
            --danger: #dc2626; --danger-bg: #fee2e2; --danger-dark: #b91c1c;
            --warning: #d97706; --warning-bg: #fef3c7; --warning-dark: #b45309;
            --bg: #f3f4f6; --surface: #ffffff; --surface-alt: #f9fafb;
            --border: #e5e7eb; --border-focus: #2563eb;
            --text: #1f2937; --text-secondary: #6b7280; --text-muted: #9ca3af;
            --radius: 8px; --radius-lg: 12px;
            --shadow-sm: 0 1px 2px rgba(0,0,0,.05);
            --shadow: 0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06);
            --shadow-lg: 0 4px 6px rgba(0,0,0,.07), 0 10px 15px rgba(0,0,0,.1);
            --header-bg: linear-gradient(135deg, #1e40af, #3b82f6);
            --marker-label-bg: rgba(255,255,255,.92);
            --panel-h: 260px;
        }
        [data-theme="dark"] {
            --bg: #0f172a; --surface: #1e293b; --surface-alt: #1e293b;
            --border: #334155; --border-focus: #60a5fa;
            --text: #e2e8f0; --text-secondary: #94a3b8; --text-muted: #64748b;
            --header-bg: linear-gradient(135deg, #1e3a5f, #2563eb);
            --marker-label-bg: rgba(30,41,59,.92);
            --danger-bg: #450a0a; --success-bg: #052e16; --warning-bg: #451a03;
            --primary-light: #1e3a5f;
        }
        html, body { height: 100%; font-family: "Microsoft JhengHei","Noto Sans TC",Arial,sans-serif; background: #000; color: var(--text); font-size: 14px; overflow: hidden; }

        /* ── Map fills entire viewport ── */
        .map-container { position: fixed; inset: 0; z-index: 0; background: #e8e8e8; }
        #map { width: 100%; height: 100%; }

        /* ── Floating panels ── */
        .float-panel {
            position: fixed; z-index: 1000;
            background: var(--surface); border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg); overflow: hidden;
            transition: transform .25s ease, opacity .25s ease;
        }
        .float-panel.hidden { pointer-events: none; opacity: 0; transform: translateY(-8px); }

        /* ── Top toolbar ── */
        .float-toolbar {
            top: 12px; left: 12px; right: 12px;
            display: flex; align-items: center; gap: 8px;
            padding: 8px 14px; border-radius: var(--radius-lg);
        }
        .brand { display: flex; align-items: center; gap: 6px; font-weight: 700; font-size: 14px; white-space: nowrap; color: var(--text); }
        .brand span:first-child { font-size: 18px; }
        .file-label {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 6px 14px; background: var(--primary); color: white;
            border-radius: var(--radius); cursor: pointer; font-weight: 600; font-size: 12px;
            transition: background .15s; white-space: nowrap;
        }
        .file-label:hover { background: var(--primary-dark); }
        .file-label input { display: none; }
        .file-name { color: var(--text-muted); font-size: 12px; max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .toolbar-spacer { flex: 1; }
        .tb-right { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }

        .btn {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 5px 12px; border: none; border-radius: 6px;
            font-size: 12px; font-weight: 600; cursor: pointer; transition: all .15s;
            white-space: nowrap;
        }
        .btn:disabled { opacity: .4; cursor: not-allowed; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover:not(:disabled) { background: var(--primary-dark); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:hover:not(:disabled) { background: var(--danger-dark); }
        .btn-outline { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
        .btn-outline:hover:not(:disabled) { background: var(--surface-alt); }
        .btn-success { background: var(--success); color: white; }
        .btn-success:hover:not(:disabled) { background: var(--success-dark); }
        .btn-warning { background: var(--warning); color: white; }
        .btn-warning:hover:not(:disabled) { background: var(--warning-dark); }
        .icon-btn {
            width: 30px; height: 30px; border: none; border-radius: 6px;
            background: var(--surface-alt); color: var(--text); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; transition: background .15s; border: 1px solid var(--border);
        }
        .icon-btn:hover { background: var(--primary-light); }

        /* ── Stats overlay ── */
        .float-stats {
            top: 60px; left: 12px;
            display: flex; gap: 6px; padding: 6px 10px; border-radius: var(--radius);
        }
        .stat-card {
            padding: 6px 12px; border-radius: 6px; text-align: center;
            min-width: 64px; transition: transform .1s;
        }
        .stat-card.clickable { cursor: pointer; }
        .stat-card.clickable:hover { transform: scale(1.05); }
        .stat-card .value { font-size: 20px; font-weight: 800; line-height: 1.2; }
        .stat-card .label { font-size: 10px; opacity: .65; margin-top: 1px; }
        .stat-card.total { background: var(--surface-alt); border: 1px solid var(--border); }
        .stat-card.success { background: var(--success-bg); color: var(--success); border: 1px solid transparent; }
        .stat-card.fail { background: var(--danger-bg); color: var(--danger); border: 1px solid transparent; }
        .stat-card.eta { background: var(--primary-light); color: var(--primary); border: 1px solid transparent; }
        .stat-card.active-filter { outline: 2px solid var(--primary); outline-offset: -2px; }

        /* ── Progress overlay ── */
        .float-progress {
            top: 106px; left: 12px; right: 12px;
            padding: 8px 14px; border-radius: var(--radius);
        }
        .progress-info {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 11px; color: var(--text-secondary); margin-bottom: 5px;
        }
        .progress-current { color: var(--primary); font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-right: 10px; }
        .progress-bar-bg { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #8b5cf6); width: 0%; transition: width .3s ease; border-radius: 2px; }

        /* ── Preview overlay ── */
        .float-preview {
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 600px; max-width: calc(100vw - 24px); max-height: calc(100vh - 24px);
            display: flex; flex-direction: column; padding: 0;
        }
        .float-preview.hidden { transform: translate(-50%, -48%); }
        .preview-head { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .preview-head h3 { font-size: 15px; font-weight: 700; }
        .preview-meta { display: flex; gap: 14px; font-size: 12px; color: var(--text-secondary); }
        .preview-meta .warn { color: var(--warning); font-weight: 600; }
        .preview-body { flex: 1; overflow-y: auto; max-height: 260px; padding: 0 18px; }
        .preview-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .preview-table th {
            position: sticky; top: 0; z-index: 1; background: var(--surface-alt);
            text-align: left; padding: 6px 8px; font-weight: 600; color: var(--text-secondary);
            border-bottom: 1px solid var(--border);
        }
        .preview-table td { padding: 4px 8px; border-bottom: 1px solid var(--border); }
        .preview-table tr.preview-warn td { background: var(--warning-bg); }
        .preview-foot { padding: 12px 18px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; flex-shrink: 0; }

        /* ── Bottom panel (slide up) ── */
        .float-bottom {
            bottom: 0; left: 0; right: 0;
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            max-height: var(--panel-h); display: flex; flex-direction: column;
            transition: transform .25s ease;
        }
        .float-bottom.collapsed { transform: translateY(calc(var(--panel-h) - 36px)); }
        .panel-tab {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 18px; cursor: pointer; user-select: none; flex-shrink: 0;
            border-bottom: 1px solid var(--border);
        }
        .panel-tab:hover { background: var(--surface-alt); }
        .panel-tab .arrow { transition: transform .2s; font-size: 10px; color: var(--text-muted); }
        .float-bottom.collapsed .arrow { transform: rotate(180deg); }
        .panel-tab-title { font-weight: 600; font-size: 13px; }
        .filter-tabs { display: flex; gap: 4px; margin-left: 10px; }
        .tab {
            padding: 2px 8px; border-radius: 10px; border: 1px solid var(--border);
            background: var(--surface); color: var(--text-secondary); font-size: 11px;
            font-weight: 600; cursor: pointer; transition: all .15s;
        }
        .tab:hover { background: var(--surface-alt); }
        .tab.active { background: var(--primary); color: white; border-color: var(--primary); }
        .tab .cnt { margin-left: 2px; opacity: .8; }
        .panel-search { padding: 5px 18px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .panel-search input {
            width: 100%; padding: 5px 10px; border: 1px solid var(--border);
            border-radius: 6px; font-size: 12px; outline: none;
            background: var(--surface); color: var(--text);
        }
        .panel-search input:focus { border-color: var(--border-focus); box-shadow: 0 0 0 2px rgba(37,99,235,.12); }
        .panel-table-wrap { flex: 1; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        thead { position: sticky; top: 0; z-index: 2; }
        th {
            background: var(--surface-alt); text-align: left; padding: 6px 8px;
            font-weight: 600; color: var(--text-secondary); border-bottom: 2px solid var(--border);
            white-space: nowrap; cursor: pointer;
        }
        th:hover { color: var(--text); }
        th .sa { margin-left: 2px; font-size: 9px; }
        td { padding: 4px 8px; border-bottom: 1px solid var(--border); }
        tr:hover td { background: var(--surface-alt); }
        tr.fail td { background: var(--danger-bg); }
        .loc-name { font-weight: 600; max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .loc-addr { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text-secondary); font-size: 11px; }
        .loc-coords { font-family: monospace; font-size: 10px; color: var(--text-muted); white-space: nowrap; }
        .map-btn { padding: 1px 6px; font-size: 10px; border-radius: 3px; cursor: pointer; border: 1px solid var(--primary); background: var(--surface); color: var(--primary); }
        .map-btn:hover { background: var(--primary-light); }
        .edit-row { display: flex; gap: 3px; }
        .edit-row input { flex: 1; min-width: 80px; padding: 2px 5px; font-size: 11px; border: 1px solid var(--border); border-radius: 3px; background: var(--surface); color: var(--text); }
        .edit-row input:focus { border-color: var(--primary); }
        .edit-btn { padding: 2px 5px; font-size: 10px; border-radius: 3px; cursor: pointer; border: 1px solid var(--border); background: var(--surface); }
        .edit-btn:hover { background: var(--surface-alt); }
        .empty-state { text-align: center; padding: 30px 16px; color: var(--text-muted); }
        .empty-state .icon { font-size: 36px; margin-bottom: 8px; }

        /* ── Toast ── */
        .toast-container { position: fixed; top: 60px; right: 12px; z-index: 9999; display: flex; flex-direction: column; gap: 6px; pointer-events: none; }
        .toast {
            padding: 8px 16px; border-radius: 6px; color: white;
            font-weight: 600; font-size: 12px; box-shadow: var(--shadow-lg);
            animation: toastIn .25s ease, toastOut .3s ease 3.7s forwards;
            max-width: 340px; pointer-events: auto;
        }
        .toast.info { background: #2563eb; }
        .toast.success { background: #16a34a; }
        .toast.error { background: #dc2626; }
        .toast.warn { background: #d97706; }
        @keyframes toastIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes toastOut { to { opacity: 0; transform: translateX(40px); } }

        /* ── Modal ── */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,.45);
            display: flex; align-items: center; justify-content: center;
            z-index: 10000; animation: fadeIn .15s ease;
        }
        .modal-box {
            background: var(--surface); border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg); width: 90%; max-width: 400px;
            animation: scaleIn .15s ease;
        }
        .modal-head { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .modal-head h3 { font-size: 15px; font-weight: 700; }
        .modal-close { background: none; border: none; font-size: 16px; cursor: pointer; color: var(--text-muted); padding: 2px; }
        .modal-close:hover { color: var(--text); }
        .modal-body { padding: 18px; }
        .export-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .export-card {
            padding: 14px; border: 1px solid var(--border); border-radius: var(--radius);
            cursor: pointer; text-align: center; transition: all .15s;
        }
        .export-card:hover { border-color: var(--primary); background: var(--primary-light); }
        .export-card .icon { font-size: 24px; margin-bottom: 4px; }
        .export-card .name { font-size: 12px; font-weight: 600; }
        .export-card .desc { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes scaleIn { from { transform: scale(.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        kbd { display: inline-block; padding: 1px 5px; font-size: 10px; font-family: monospace; background: var(--surface-alt); border: 1px solid var(--border); border-radius: 3px; }
        .floating-label {
            background: var(--marker-label-bg); border: 2px solid var(--primary);
            border-radius: 5px; padding: 2px 6px; font-weight: 700; font-size: 11px;
            white-space: nowrap; box-shadow: var(--shadow); color: var(--text);
        }
        .hidden { display: none !important; }

        @media (max-width: 640px) {
            .float-toolbar { padding: 6px 10px; gap: 5px; flex-wrap: wrap; }
            .brand span:last-child { display: none; }
            .file-name { display: none; }
            .float-stats { top: 54px; left: 8px; gap: 4px; padding: 4px 6px; }
            .stat-card { padding: 4px 8px; min-width: 52px; }
            .stat-card .value { font-size: 16px; }
            .float-progress { top: 96px; left: 8px; right: 8px; }
            .float-preview { width: calc(100vw - 16px); }
            :root { --panel-h: 200px; }
            .loc-name { max-width: 80px; }
            .loc-addr { max-width: 100px; }
        }
    </style>
</head>
<body>
    <!-- Map is the base layer -->
    <div class="map-container"><div id="map"></div></div>

    <!-- Toolbar (floating) -->
    <div class="float-panel float-toolbar" id="float-toolbar">
        <div class="brand"><span>🗺️</span><span>社地址地圖</span></div>
        <span class="brand" style="font-size:13px;">📦 社地址資料 (31 筆)</span>
        <div class="toolbar-spacer"></div>
        <div class="tb-right">
            <button class="btn btn-outline" id="btn-export">↓ 匯出</button>
            <button class="icon-btn" id="btn-clear-cache" title="清除快取">🗑️</button>
            <button class="icon-btn" id="btn-theme" title="深色模式">🌙</button>
            <button class="icon-btn" id="btn-shortcuts" title="快捷鍵">⌨</button>
        </div>
    </div>

    <!-- Stats (floating) -->
    <div class="float-panel float-stats hidden" id="float-stats">
        <div class="stat-card total"><div class="value" id="stat-total">0</div><div class="label">總筆數</div></div>
        <div class="stat-card success clickable" id="card-ok"><div class="value" id="stat-ok">0</div><div class="label">成功</div></div>
        <div class="stat-card fail clickable" id="card-fail"><div class="value" id="stat-fail">0</div><div class="label">失敗</div></div>
        <div class="stat-card eta"><div class="value" id="stat-eta">--</div><div class="label">預估</div></div>
    </div>

    <!-- Bottom panel (slide-up drawer) -->
    <div class="float-panel float-bottom collapsed" id="float-bottom">
        <div class="panel-tab" id="panel-toggle">
            <span class="arrow">▲</span>
            <span class="panel-tab-title">📋 結果清單</span>
            <div class="filter-tabs">
                <button class="tab active" data-filter="all">全部 <span class="cnt" id="badge-all">0</span></button>
                <button class="tab" data-filter="ok">成功 <span class="cnt" id="badge-ok">0</span></button>
                <button class="tab" data-filter="fail">失敗 <span class="cnt" id="badge-fail">0</span></button>
            </div>
        </div>
        <div class="panel-search" id="panel-search-wrap">
            <input type="text" id="search-input" placeholder="🔍 搜尋名稱或地址..." />
        </div>
        <div class="panel-table-wrap" id="panel-body">
            <table id="result-table" class="hidden">
                <thead><tr>
                    <th data-sort="status">狀態 <span class="sa"></span></th>
                    <th data-sort="name">社名 <span class="sa"></span></th>
                    <th data-sort="address">地址 <span class="sa"></span></th>
                    <th data-sort="coords">座標 <span class="sa"></span></th>
                    <th>操作</th>
                </tr></thead>
                <tbody id="table-body"></tbody>
            </table>
            <div class="empty-state" id="empty-state">
                <div class="icon">📭</div>
                <p>尚無結果</p>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script>
    (function() {
        const STATE_KEY = '社地址mapViewer';

        async function geocode(address) {
            const cleaned = cleanAddress(address);
            const m = cleaned.match(/^(.+?[縣市])(.+?[鄉鎮市區])(.+)$/);
            if (m) {
                const city = m[1], dist = m[2];
                let street = m[3].trim();
                let c = await fetchCoords(`${street}, ${dist}, ${city}, 台灣`);
                if (c) return c;
                let streetOnly = street.replace(/\d+.*$/, '').trim();
                if (streetOnly && streetOnly !== street) {
                    c = await fetchCoords(`${streetOnly}, ${dist}, ${city}, 台灣`);
                    if (c) return c;
                }
                let pure = streetOnly.replace(/^.{1,3}[村里]/, '').trim();
                if (pure && pure !== streetOnly) {
                    c = await fetchCoords(`${pure}, ${dist}, ${city}, 台灣`);
                    if (c) return c;
                }
                if (pure) { c = await fetchCoords(`${pure}, ${city}, 台灣`); if (c) return c; }
                const vm = street.match(/^(.+?[村里])/);
                if (vm) { c = await fetchCoords(`${vm[1]}, ${dist}, ${city}, 台灣`); if (c) return c; }
                c = await fetchCoords(`${dist}, ${city}, 台灣`);
                if (c) return c;
            }
            let c = await fetchCoords(cleaned + ', 台灣');
            return c;
        }

        async function fetchCoords(query) {

                if (resp.status === 429 || resp.status === 403 || !resp.ok) return null;
                const data = await resp.json();
                return data?.length > 0 ? { lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon) } : null;
            } catch (e) { return null; }
        }

            markers.addLayer(marker);
            markerMap.set(name, marker);

        function renderTable() {

            const q = $('search-input').value.trim().toLowerCase();

            if (sortCol) {
                items = [...items].sort((a, b) => {
                    let va, vb;
                    if (sortCol === 'status') { va = a.status; vb = b.status; }
                    else if (sortCol === 'name') { va = a.name; vb = b.name; }
                    else if (sortCol === 'address') { va = a.address; vb = b.address; }
                    else if (sortCol === 'coords') { va = a.status === 'ok' ? a.lat : -999; vb = b.status === 'ok' ? b.lat : -999; }
                    return va < vb ? -sortDir : va > vb ? sortDir : 0;

            }
            const tbody = $('table-body');

                const coords = r.status === 'ok' ? `${r.lat.toFixed(4)}, ${r.lon.toFixed(4)}` : '—';

                tbody.appendChild(tr);

        function exportData(fmt) {
            if (!allResults.length) return;
            let blob, fn;
            if (fmt === 'csv') {
                blob = new Blob(['\uFEFF社名,地址,服務時間,緯度,經度,狀態\n' + allResults.map(r => `"${r.name}","${r.address}","${r.serviceTime || ''}",${r.status === 'ok' ? r.lat : ''},${r.status === 'ok' ? r.lon : ''},"${r.status === 'ok' ? '成功' : '失敗'}"`).join('\n')], { type: 'text/csv;charset=utf-8;' });
                fn = '社地址_結果.csv';
            } else if (fmt === 'json') {
                blob = new Blob([JSON.stringify(allResults, null, 2)], { type: 'application/json' }); fn = '社地址_結果.json';
            } else if (fmt === 'geojson') {
                const f = allResults.filter(r => r.status === 'ok').map(r => ({ type: 'Feature', geometry: { type: 'Point', coordinates: [r.lon, r.lat] }, properties: { name: r.name, address: r.address, serviceTime: r.serviceTime } }));
                blob = new Blob([JSON.stringify({ type: 'FeatureCollection', features: f }, null, 2)], { type: 'application/geo+json' }); fn = '社地址_結果.geojson';
            } else if (fmt === 'kml') {
                let k = '<?xml version="1.0" encoding="UTF-8"?>\n<kml xmlns="http://www.opengis.net/kml/2.2">\n<Document>\n<name>社地址</name>\n';
                allResults.filter(r => r.status === 'ok').forEach(r => k += `<Placemark><name>${esc(r.name)}</name><description>${esc(r.address)}${r.serviceTime ? ' | 服務時間：' + esc(r.serviceTime) : ''}</description><Point><coordinates>${r.lon},${r.lat},0</coordinates></Point></Placemark>\n`);
                blob = new Blob([k + '</Document>\n</kml>'], { type: 'application/vnd.google-earth.kml+xml' }); fn = '社地址_結果.kml';
            }
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = fn; a.click();
            toast(fmt.toUpperCase() + ' 已下載', 'success');

        const EXPIRE_MS = 7 * 24 * 3600 * 1000; // 7 days
        function saveState() { try { localStorage.setItem(STATE_KEY, JSON.stringify({ results: allResults, timestamp: Date.now() })); } catch (e) {} }
        function loadState() {
            try {
                const raw = localStorage.getItem(STATE_KEY);
                if (!raw) return;
                const data = JSON.parse(raw);
                if (!data.results?.length || Date.now() - (data.timestamp || 0) > EXPIRE_MS) { localStorage.removeItem(STATE_KEY); return; }
                allResults = data.results;
                $('float-stats').classList.remove('hidden');
                clearMarkers();
                allResults.filter(r => r.status === 'ok').forEach(r => addMarker(r.lat, r.lon, r.name, r.address, r.serviceTime));
                updateStats(); renderTable();
                if (markers.getBounds().isValid()) map.fitBounds(markers.getBounds().pad(0.1));
                const age = Math.round((Date.now() - data.timestamp) / 60000);
                toast(`已恢復上次結果 (${allResults.length} 筆，${age < 60 ? age + '分鐘前' : Math.round(age/60) + '小時前'})`, 'info');
            } catch (e) { localStorage.removeItem(STATE_KEY); }
        }

        updateStats(); renderTable(); loadState();
    })();
    </script>
</body>
</html>
